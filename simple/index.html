<!DOCTYPE html>
<html>
<head>
  <title>Simple Form</title>
</head>
<body>

  <form name="myForm" onsubmit="handleSubmit(event)">
    <h3>Simple Contact Form</h3>

    <input type="text" name="nameBox" placeholder="Your Name" required>
    <br><br>

    <input type="email" name="emailBox" placeholder="Your Email" required>
    <br><br>

    <button type="submit">Submit</button>

      <a href='https://github.com/idli-dev/idli-dev.github.io/blob/main/simple/index.html'>
        Click here to see the source code
      </a>
  </form>

  <script>
    function handleSubmit(event) {
      event.preventDefault();

      var NAME = document.myForm.nameBox.value;
      var EMAIL = document.myForm.emailBox.value;

      console.log("Name:", NAME);
      console.log("Email:", EMAIL);

      alert("Stored in variables NAME and EMAIL");
    }
  </script>

</body>
</html>
